<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" width="200" height="50">
  <defs>
    <style>
      .logo-text { font-family: 'Georgia', serif; font-weight: 700; font-size: 28px; fill: #0d9488; }
      .logo-icon { fill: #0d9488; }
    </style>
  </defs>
  
  <!-- House Icon -->
  <g class="logo-icon">
    <!-- House body -->
    <rect x="8" y="22" width="24" height="20" rx="2" fill="#0d9488"/>
    <!-- Roof -->
    <polygon points="20,8 4,24 36,24" fill="#0d9488"/>
    <!-- Door -->
    <rect x="16" y="30" width="8" height="12" fill="#ccfbf1"/>
    <!-- Window -->
    <rect x="26" y="28" width="4" height="4" fill="#ccfbf1"/>
    <!-- Play button overlay -->
    <circle cx="20" cy="28" r="6" fill="#22c55e" opacity="0.9"/>
    <polygon points="18,25 18,31 23,28" fill="white"/>
  </g>
  
  <!-- Text -->
  <text x="44" y="36" class="logo-text">CasaVid</text>
</svg>
